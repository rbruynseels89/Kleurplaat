<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kleurplaat app voor Cleo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section id="pickerView" class="view picker-view">
        <header class="topbar">
          <div>
            <h1>Kies een kleurplaat</h1>
            <p>Grote knoppen, weinig afleiding.</p>
          </div>
        </header>
        <div id="sheetGrid" class="sheet-grid"></div>
      </section>

      <section id="colorView" class="view color-view hidden">
        <header class="color-header">
          <button id="backButton" class="icon-button" type="button" aria-label="Terug naar kiezen" title="Terug">
            <span aria-hidden="true">←</span>
          </button>
          <h1 id="activeTitle">Kleurplaat</h1>
          <div class="header-actions">
            <button id="clearButton" class="text-button" type="button">Opnieuw</button>
            <button id="saveButton" class="text-button" type="button">Bewaar</button>
          </div>
        </header>

        <div class="workspace">
          <div class="canvas-frame">
            <canvas id="drawingCanvas" aria-label="Inkleuren"></canvas>
          </div>

          <aside class="tools" aria-label="Kleuren">
            <div id="palette" class="palette"></div>
            <button id="eraserButton" class="tool-button" type="button" aria-label="Gum" title="Gum">
              <span aria-hidden="true">⌫</span>
            </button>
            <label class="brush-control">
              <span>Dikte</span>
              <input id="brushSize" type="range" min="18" max="64" value="36" />
            </label>
          </aside>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
